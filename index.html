<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f6f8fb" />
  <meta name="description" content="敢为（Ganwei）— 集研发、生产、销售于一体的工具制造商，为全球客户提供全面的 DIY 工具解决方案。" />
  <title>敢为 Ganwei · 工具制造商 | 官方主页</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="brand">
        <!-- 可替换为 <img src="logo.svg" alt="" class="brand__logo" /> -->
        <span class="brand__mark" aria-hidden="true"></span>
        <span class="brand__name">
          敢为
          <span class="brand__name-en" lang="en">Ganwei</span>
        </span>
      </div>
    </header>

    <main class="main">
      <section class="hero">
        <p class="hero__eyebrow">DIY 工具 · 官方入口</p>
        <h1 class="hero__title">敢为（Ganwei），您身边的工具制造伙伴</h1>
        <p class="hero__lead">
          敢为（Ganwei）是集研发、生产、销售于一体的工具制造商，致力于为全球客户提供全面的 DIY 工具解决方案。欢迎前往官方网店浏览产品、了解详情并下单选购。
        </p>
        <div class="hero__actions">
          <!-- 将 href 改为您的网店地址，例如淘宝、京东、有赞、微店等 -->
          <a
            class="btn btn--primary"
            href="https://example.com/your-shop"
            target="_blank"
            rel="noopener noreferrer"
          >
            前往官方网店
            <span class="btn__arrow" aria-hidden="true">→</span>
          </a>
          <a class="btn btn--ghost" href="#contact">联系咨询</a>
        </div>
      </section>

      <section class="features" aria-label="企业优势">
        <ul class="feature-list">
          <li class="feature-list__item">
            <strong>研产销一体</strong>
            <span>从研发到制造与交付，全流程可控、品质可追溯</span>
          </li>
          <li class="feature-list__item">
            <strong>DIY 工具方案</strong>
            <span>覆盖多场景需求，提供系统化 DIY 工具组合</span>
          </li>
          <li class="feature-list__item">
            <strong>服务全球客户</strong>
            <span>持续创新产品与服务，助力海内外用户安心选购</span>
          </li>
        </ul>
      </section>

      <section class="contact" id="contact">
        <h2 class="contact__title">联系方式</h2>
        <p class="contact__text">
          <!-- 按需填写邮箱、电话或企业微信 -->
          商务合作：<a href="mailto:contact@example.com">contact@example.com</a>
        </p>
      </section>
    </main>

    <footer class="footer">
      <p>© <span id="year"></span> 敢为 Ganwei · 保留所有权利</p>
    </footer>
  </div>
  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
